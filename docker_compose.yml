services:
  web:
   image: nginx:latest
   container_name: nginx
   ports: 
    - 8000:80
   networks: 
    - new_network
   volumes:
     - ./public:/usr/share/nginx/html:ro
     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
   depends_on:
    go_app:
     condition: service_started
  go_app:
    image: altamsh/go-app:nonroot
    container_name: go_app
    ports:
     - 3000:3000
    networks:
     - new_network
networks:
  new_network:
